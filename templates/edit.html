<!DOCTYPE html>
<html>
<head>
    <title>Edit Appointment</title>
</head>
<body>

<h2>Edit Appointment</h2>

<form method="POST">
    Name: <input type="text" name="name" value="{{ data[1] }}" required><br><br>
    Phone: <input type="text" name="phone" value="{{ data[2] }}" required><br><br>
    Date: <input type="date" name="date" value="{{ data[3] }}" required><br><br>

    <button type="submit">Update</button>
</form>

<a href="/appointments">Back</a>

</body>
</html>
